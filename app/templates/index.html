<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dự đoán giá xe</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
</head>

<body class="bg-gradient-to-br from-gray-100 to-gray-200 min-h-screen p-6">

<div class="max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-5 gap-6">

    <!-- LEFT: MODEL (NHỎ LẠI) -->
    <div class="bg-white p-4 rounded-2xl shadow-lg md:col-span-1">
        <h2 class="text-lg font-bold text-center mb-4 text-gray-700">
            <i class="fas fa-brain text-emerald-500"></i><br>
            Mô hình
        </h2>

        <form id="predict-form" class="space-y-2">

            <label class="flex items-center gap-2 p-2 rounded hover:bg-gray-50 cursor-pointer text-sm">
                <input type="checkbox" name="models" value="lr" class="accent-emerald-500">
                Linear Regression
            </label>

            <label class="flex items-center gap-2 p-2 rounded hover:bg-gray-50 cursor-pointer text-sm">
                <input type="checkbox" name="models" value="rr" class="accent-emerald-500">
                Ridge Regression
            </label>

            <label class="flex items-center gap-2 p-2 rounded hover:bg-gray-50 cursor-pointer text-sm">
                <input type="checkbox" name="models" value="dt" class="accent-emerald-500">
                Decision Tree
            </label>
    </div>

    <!-- CENTER: INPUT (TO HƠN) -->
    <div class="bg-white p-6 rounded-2xl shadow-lg md:col-span-2">
        <h2 class="text-xl font-bold text-center mb-6 text-gray-700">
            <i class="fas fa-edit text-blue-500"></i><br>
            Nhập dữ liệu
        </h2>

        <select name="origin" required class="w-full border p-3 rounded mb-3">
            <option disabled selected value="">Xuất xứ</option>
            {% for val in unique_values.origin %}
            <option value="{{ val }}">{{ val }}</option>
            {% endfor %}
        </select>

        <select name="fuel" required class="w-full border p-3 rounded mb-3">
            <option disabled selected value="">Nhiên liệu</option>
            {% for val in unique_values.fuel %}
            <option value="{{ val }}">{{ val }}</option>
            {% endfor %}
        </select>

        <select name="body" required class="w-full border p-3 rounded mb-3">
            <option disabled selected value="">Thân xe</option>
            {% for val in unique_values.body %}
            <option value="{{ val }}">{{ val }}</option>
            {% endfor %}
        </select>

        <select name="brand" required class="w-full border p-3 rounded mb-3">
            <option disabled selected value="">Hãng xe</option>
            {% for val in unique_values.brand %}
            <option value="{{ val }}">{{ val }}</option>
            {% endfor %}
        </select>

        <select name="gearbox" required class="w-full border p-3 rounded mb-3">
            <option disabled selected value="">Hộp số</option>
            {% for val in unique_values.gearbox %}
            <option value="{{ val }}">{{ val }}</option>
            {% endfor %}
        </select>

        <input type="number" name="age" placeholder="Tuổi xe" required
            class="w-full border p-3 rounded mb-3">

        <input type="number" name="km" placeholder="Số km" required
            class="w-full border p-3 rounded mb-4">

        <button type="submit"
            class="w-full bg-gradient-to-r from-emerald-500 to-emerald-600 text-white py-3 rounded-lg font-semibold hover:scale-105 transition">
            🚀 Dự đoán
        </button>

        </form>
    </div>

    <!-- RIGHT: RESULT -->
    <div class="bg-white p-6 rounded-2xl shadow-lg md:col-span-2">
        
        <h2 class="text-2xl font-bold text-center mb-2 text-gray-800">
            🚗 Dự báo giá xe
        </h2>

        <p class="text-center text-gray-500 mb-6">
            Khoảng giá ước tính từ các mô hình
        </p>

        <div id="result" class="space-y-4 text-gray-700">
            <div class="text-center text-gray-400">
                Chưa có dữ liệu
            </div>
        </div>
    </div>

<script>
document.getElementById('predict-form').addEventListener('submit', async (e) => {
    e.preventDefault();

    const resultDiv = document.getElementById('result');

    const form = e.target;
    const formData = new FormData(form);

    // ✅ VALIDATE TRƯỚC KHI GỬI
    const requiredFields = ["origin","fuel","body","brand","gearbox","age","km"];
    for (let field of requiredFields) {
        if (!formData.get(field)) {
            resultDiv.innerHTML = "⚠️ Vui lòng nhập đầy đủ thông tin!";
            return;
        }
    }

    const selectedModels = formData.getAll("models");
    if (selectedModels.length === 0) {
        resultDiv.innerHTML = `
                        <div class="text-center text-red-500 font-semibold py-6">
                            ⚠️ Vui lòng chọn ít nhất 1 mô hình!
                        </div>
                    `;
        return;
    }

    resultDiv.innerHTML = '⏳ Đang dự đoán...';

    try {
        const response = await fetch('/predict', {
            method: 'POST',
            body: formData
        });

        const result = await response.json();

        if (result.error) {

    // ojbect error
    if (typeof result.error === "object") {
        let errorHtml = "<div class='text-red-500 text-center space-y-1'>";

        for (const key in result.error) {
            errorHtml += `<div>⚠️ ${result.error[key]}</div>`;
        }

        errorHtml += "</div>";
        resultDiv.innerHTML = errorHtml;
    } 
    
    // string error
    else {
        resultDiv.innerHTML = `<div class="text-red-500 text-center">❌ ${result.error}</div>`;
    }

    return;
}

        const modelNames = {
            "lr": "Linear Regression",
            "rr": "Ridge Regression",
            "dt": "Decision Tree"
        };

let html = "";

selectedModels.forEach(key => {
    if (result[key]) {

        const pred = Number(result[key].prediction).toLocaleString('vi-VN');
        const lower = Number(result[key].lower).toLocaleString('vi-VN');
        const upper = Number(result[key].upper).toLocaleString('vi-VN');

        html += `
            <div class="bg-gradient-to-r from-gray-50 to-gray-100 p-5 rounded-xl shadow">

                <!-- MODEL NAME -->
                <div class="text-center font-bold text-gray-800 mb-3">
                    ${modelNames[key]}
                </div>

                <div class="text-center text-lg font-semibold text-emerald-500 mb-2">
                    ${pred} VND
                </div>

                <!-- RANGE -->
                <div class="flex justify-between text-lg font-semibold text-blue-600">
                    <span>${lower}</span>
                    <span>${upper}</span>
                </div>
                <!-- BAR -->
                <div class="w-full bg-gray-200 rounded-full h-2 mt-3">
                    <div class="bg-blue-500 h-2 rounded-full w-full"></div>
                </div>

            </div>
        `;
    }
});
        resultDiv.innerHTML = html;

    } catch (err) {
        resultDiv.innerHTML = "❌ Lỗi: " + err.message;
    }
});
</script>

</body>
</html>
