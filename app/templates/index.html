<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dự đoán giá xe</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
</head>

<body class="bg-gradient-to-br from-gray-100 to-gray-200 min-h-screen p-6">

<div class="max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-3 gap-6">

    <!-- LEFT: MODEL -->
    <div class="bg-white p-6 rounded-2xl shadow-lg">
        <h2 class="text-xl font-bold text-center mb-6 text-gray-700">
            <i class="fas fa-brain text-emerald-500"></i><br>
            Mô hình
        </h2>

        <form id="predict-form" class="space-y-3">

            <label class="flex items-center gap-3 p-2 rounded hover:bg-gray-50 cursor-pointer">
                <input type="checkbox" name="models" value="lr" class="accent-emerald-500">
                Linear Regression
            </label>

            <label class="flex items-center gap-3 p-2 rounded hover:bg-gray-50 cursor-pointer">
                <input type="checkbox" name="models" value="rr" class="accent-emerald-500">
                Ridge Regression
            </label>

            <label class="flex items-center gap-3 p-2 rounded hover:bg-gray-50 cursor-pointer">
                <input type="checkbox" name="models" value="dt" class="accent-emerald-500">
                Decision Tree
            </label>

            <label class="flex items-center gap-3 p-2 rounded hover:bg-gray-50 cursor-pointer">
                <input type="checkbox" name="models" value="svr" class="accent-emerald-500">
                SVR
            </label>
    </div>

    <!-- CENTER: INPUT -->
    <div class="bg-white p-6 rounded-2xl shadow-lg">
        <h2 class="text-xl font-bold text-center mb-6 text-gray-700">
            <i class="fas fa-edit text-blue-500"></i><br>
            Nhập dữ liệu
        </h2>

        <!-- Origin -->
        <select name="origin" required class="w-full border p-2 rounded mb-3 focus:ring-2 focus:ring-blue-400">
            <option disabled selected>Xuất xứ</option>
            {% for val in unique_values.origin %}
            <option value="{{ val }}">{{ val }}</option>
            {% endfor %}
        </select>

        <!-- Fuel -->
        <select name="fuel" required class="w-full border p-2 rounded mb-3 focus:ring-2 focus:ring-blue-400">
            <option disabled selected>Nhiên liệu</option>
            {% for val in unique_values.fuel %}
            <option value="{{ val }}">{{ val }}</option>
            {% endfor %}
        </select>

        <!-- Body -->
        <select name="body" required class="w-full border p-2 rounded mb-3 focus:ring-2 focus:ring-blue-400">
            <option disabled selected>Thân xe</option>
            {% for val in unique_values.body %}
            <option value="{{ val }}">{{ val }}</option>
            {% endfor %}
        </select>

        <!-- Brand -->
        <select name="brand" required class="w-full border p-2 rounded mb-3 focus:ring-2 focus:ring-blue-400">
            <option disabled selected>Hãng xe</option>
            {% for val in unique_values.brand %}
            <option value="{{ val }}">{{ val }}</option>
            {% endfor %}
        </select>

        <!-- Gearbox -->
        <select name="gearbox" required class="w-full border p-2 rounded mb-3 focus:ring-2 focus:ring-blue-400">
            <option disabled selected>Hộp số</option>
            {% for val in unique_values.gearbox %}
            <option value="{{ val }}">{{ val }}</option>
            {% endfor %}
        </select>

        <!-- Age -->
        <input type="number" name="age" placeholder="Tuổi xe"
            class="w-full border p-2 rounded mb-3 focus:ring-2 focus:ring-blue-400" required>

        <!-- KM -->
        <input type="number" name="km" placeholder="Số km"
            class="w-full border p-2 rounded mb-4 focus:ring-2 focus:ring-blue-400" required>

        <!-- Submit -->
        <button type="submit"
            class="w-full bg-gradient-to-r from-emerald-500 to-emerald-600 text-white py-2 rounded-lg font-semibold hover:scale-105 transition">
            🚀 Dự đoán
        </button>

        </form>
    </div>

    <!-- RIGHT: RESULT -->
    <div class="bg-white p-6 rounded-2xl shadow-lg">
        <h2 class="text-xl font-bold text-center mb-6 text-gray-700">
            <i class="fas fa-chart-line text-purple-500"></i><br>
            Kết quả
        </h2>

        <div id="result" class="space-y-3 text-center text-gray-700">
            Chưa có dữ liệu
        </div>
    </div>

</div>

<script>
document.getElementById('predict-form').addEventListener('submit', async (e) => {
    e.preventDefault();

    const resultDiv = document.getElementById('result');
    resultDiv.innerHTML = '⏳ Đang dự đoán...';

    const formData = new FormData(e.target);

    try {
        const response = await fetch('/predict', {
            method: 'POST',
            body: formData
        });

        const result = await response.json();

        if (result.error) {
            resultDiv.innerHTML = result.error;
            return;
        }

        const modelNames = {
            "lr": "Linear Regression",
            "rr": "Ridge Regression",
            "dt": "Decision Tree",
            "svr": "SVR"
        };

        let html = "";

        for (const key in result) {
            html += `
                <div class="bg-gradient-to-r from-gray-50 to-gray-100 p-4 rounded-xl shadow hover:shadow-md transition">
                    <b class="text-gray-800">${modelNames[key]}</b><br>
                    <span class="text-blue-600 font-semibold text-lg">
                        ${Number(result[key].lower).toLocaleString('vi-VN')} 
                        - 
                        ${Number(result[key].upper).toLocaleString('vi-VN')} VND
                    </span>
                </div>
            `;
        }

        resultDiv.innerHTML = html;

    } catch (err) {
        resultDiv.innerHTML = "❌ Lỗi: " + err.message;
    }
});
</script>

</body>
</html>
